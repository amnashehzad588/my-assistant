<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Assistant</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

  <div id="app">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-logo">
          <div class="logo-circle">M</div>
          <span>My Assistant</span>
        </div>
        <button class="icon-btn" onclick="newChat()" title="New Chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>

      <button class="new-chat-full-btn" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <div class="history-section">
        <p class="history-label">Recent</p>
        <div id="chat-history"></div>
      </div>

      <div class="sidebar-footer">
        <!-- Dark/Light toggle -->
        <div class="theme-row">
          <span class="theme-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="15" height="15">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
            <span id="theme-text">Light mode</span>
          </span>
          <button class="toggle-switch" id="theme-toggle" onclick="toggleTheme()">
            <span class="toggle-thumb"></span>
          </button>
        </div>

        <div class="user-row">
          <div class="user-avatar">A</div>
          <div class="user-info">
            <strong>Amna</strong>
            <span>CS Student · Faisalabad</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN AREA -->
    <main id="main-area">

      <header id="topbar">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20">
            <path d="M3 6h18M3 12h18M3 18h18"/>
          </svg>
        </button>
        <div class="model-tag">
          <div class="online-dot"></div>
          llama-3.3-70b
        </div>
        <div class="topbar-right">
          <button class="export-btn" onclick="exportChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" width="15" height="15">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Export
          </button>
          <button class="new-chat-top-btn" onclick="newChat()">New chat</button>
        </div>
      </header>

      <div id="messages-container">

        <!-- Welcome screen -->
        <div id="welcome-screen">
          <div class="welcome-logo">M</div>
          <h2>How can I help you?</h2>
          <p>Ask me anything about Amna</p>
          <div class="sug-grid">
            <button class="sug-card" onclick="ask('Who is Amna? Tell me about her.')">
              <span class="sug-title">Who is Amna?</span>
              <span class="sug-desc">Background & intro</span>
            </button>
            <button class="sug-card" onclick="ask('What technical skills does Amna have?')">
              <span class="sug-title">Technical skills</span>
              <span class="sug-desc">Programming & tools</span>
            </button>
            <button class="sug-card" onclick="ask('What is Amna studying and what are her career goals?')">
              <span class="sug-title">Education & Goals</span>
              <span class="sug-desc">CS degree & future</span>
            </button>
            <button class="sug-card" onclick="ask('Tell me about Amna\'s family and personal background.')">
              <span class="sug-title">Personal life</span>
              <span class="sug-desc">Family & hobbies</span>
            </button>
          </div>
        </div>

        <div id="messages-list"></div>
      </div>

      <!-- Input -->
      <div id="input-section">
        <div id="followup-bar" class="hidden"></div>
        <div id="input-wrapper">
          <textarea id="msg-input" placeholder="Message My Assistant..." rows="1"></textarea>
          <button id="send-btn" onclick="sendMessage()" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p id="footer-note">My Assistant · Personal portfolio project by Amna</p>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
